<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <clipPath id="bn"><rect x="0" y="0" width="1200" height="420" rx="28"/></clipPath>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.9"/><stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5DA2" stop-opacity="0.85"/><stop offset="100%" stop-color="#FF5DA2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF7A45" stop-opacity="0.8"/><stop offset="100%" stop-color="#FF7A45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34E7E4" stop-opacity="0.7"/><stop offset="100%" stop-color="#34E7E4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C5CFF"/><stop offset="40%" stop-color="#FF5DA2"/>
      <stop offset="75%" stop-color="#FF7A45"/><stop offset="100%" stop-color="#FFB35C"/>
    </linearGradient>
    <pattern id="dots" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="0.8" fill="#FFFFFF"/>
    </pattern>
  </defs>

  <g clip-path="url(#bn)">
    <rect width="1200" height="420" fill="#0A0A0B"/>
    <circle cx="180" cy="120" r="320" fill="url(#g1)"/>
    <circle cx="1050" cy="90" r="280" fill="url(#g2)"/>
    <circle cx="980" cy="380" r="320" fill="url(#g3)"/>
    <circle cx="320" cy="400" r="280" fill="url(#g4)"/>
    <rect width="1200" height="420" fill="#08080A" opacity="0.5"/>
    <rect width="1200" height="420" fill="url(#dots)" opacity="0.05"/>

    <text x="600" y="92" fill="#FFB35C" font-size="18" font-weight="700" letter-spacing="8" text-anchor="middle">GEMINI · VISION · INTELLIGENCE</text>
    <text x="600" y="232" fill="url(#wordmark)" font-size="150" font-weight="800" letter-spacing="-4" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">VisionAI</text>
    <text x="600" y="290" fill="#F6F4EF" font-size="26" text-anchor="middle">Point your camera. Capture the moment.</text>
    <text x="600" y="324" fill="#A6A29A" font-size="26" text-anchor="middle">Let AI tell you what's really in the frame.</text>

    <g text-anchor="middle" font-size="15" font-weight="600" fill="#F6F4EF">
      <rect x="384" y="356" width="120" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/><text x="444" y="378">Objects</text>
      <rect x="512" y="356" width="120" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/><text x="572" y="378">Context</text>
      <rect x="640" y="356" width="130" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/><text x="705" y="378">Activities</text>
      <rect x="778" y="356" width="38" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/><text x="797" y="378">+</text>
    </g>

    <rect x="1" y="1" width="1198" height="418" rx="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
  </g>
</svg>
