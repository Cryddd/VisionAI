<svg width="360" height="740" viewBox="0 0 360 740" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <clipPath id="screen"><rect x="0" y="0" width="360" height="740" rx="44"/></clipPath>
    <radialGradient id="b1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#7C5CFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5DA2" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#FF5DA2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF5DA2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF7A45" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FF7A45" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF7A45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB35C" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFB35C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB35C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="40%" stop-color="#FF5DA2"/>
      <stop offset="75%" stop-color="#FF7A45"/>
      <stop offset="100%" stop-color="#FFB35C"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#screen)">
    <rect width="360" height="740" fill="#0A0A0B"/>
    <circle cx="70" cy="110" r="190" fill="url(#b1)"/>
    <circle cx="320" cy="170" r="170" fill="url(#b2)"/>
    <circle cx="270" cy="560" r="210" fill="url(#b3)"/>
    <circle cx="60" cy="640" r="180" fill="url(#b4)"/>
    <rect width="360" height="740" fill="#08080A" opacity="0.46"/>

    <!-- top bar -->
    <text x="28" y="64" fill="#F6F4EF" font-size="12" font-weight="700" letter-spacing="4">VISIONAI</text>
    <rect x="296" y="44" width="40" height="40" rx="20" fill="#F6F4EF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <g stroke="#F6F4EF" stroke-width="2" stroke-linecap="round">
      <line x1="308" y1="60" x2="324" y2="60"/><circle cx="318" cy="60" r="2.5" fill="#0A0A0B"/>
      <line x1="308" y1="68" x2="324" y2="68"/><circle cx="313" cy="68" r="2.5" fill="#0A0A0B"/>
    </g>

    <!-- decorative ring -->
    <circle cx="345" cy="170" r="90" fill="none" stroke="#F6F4EF" stroke-opacity="0.16"/>

    <!-- hero -->
    <text x="28" y="320" fill="#FFB35C" font-size="11" font-weight="700" letter-spacing="3">GEMINI · VISION · INTELLIGENCE</text>
    <text x="26" y="392" fill="#F6F4EF" font-size="52" font-weight="800" font-family="Georgia, 'Times New Roman', serif">Point.</text>
    <text x="26" y="448" fill="#F6F4EF" font-size="52" font-weight="800" font-family="Georgia, 'Times New Roman', serif">Capture.</text>
    <text x="26" y="504" fill="#FF7A45" font-size="52" font-weight="800" font-style="italic" font-family="Georgia, 'Times New Roman', serif">Understand.</text>

    <text x="28" y="548" fill="#A6A29A" font-size="14">VisionAI reads any scene through Gemini</text>
    <text x="28" y="568" fill="#A6A29A" font-size="14">Vision — naming the objects, the context,</text>
    <text x="28" y="588" fill="#A6A29A" font-size="14">the activity, and what to do next.</text>

    <!-- feature pills -->
    <g font-size="11" font-weight="600" fill="#F6F4EF">
      <rect x="28" y="612" width="84" height="30" rx="15" fill="#F6F4EF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <circle cx="44" cy="627" r="3" fill="#3DDC97"/><text x="54" y="631">Objects</text>
      <rect x="120" y="612" width="84" height="30" rx="15" fill="#F6F4EF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <circle cx="136" cy="627" r="3" fill="#3DDC97"/><text x="146" y="631">Context</text>
      <rect x="212" y="612" width="92" height="30" rx="15" fill="#F6F4EF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <circle cx="228" cy="627" r="3" fill="#3DDC97"/><text x="238" y="631">Activities</text>
    </g>

    <!-- CTA -->
    <rect x="28" y="668" width="304" height="56" rx="28" fill="url(#cta)"/>
    <text x="180" y="702" fill="#000000" font-size="17" font-weight="700" text-anchor="middle">◎  Get Started</text>

    <rect x="0.5" y="0.5" width="359" height="739" rx="44" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
  </g>
</svg>
