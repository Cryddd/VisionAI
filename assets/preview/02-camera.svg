<svg width="360" height="740" viewBox="0 0 360 740" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <clipPath id="screen"><rect x="0" y="0" width="360" height="740" rx="44"/></clipPath>
    <linearGradient id="view" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2730"/>
      <stop offset="45%" stop-color="#3B3340"/>
      <stop offset="100%" stop-color="#1A1820"/>
    </linearGradient>
    <radialGradient id="subject" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#5B5468" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A1820" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#screen)">
    <!-- viewfinder -->
    <rect width="360" height="740" fill="url(#view)"/>
    <circle cx="180" cy="330" r="150" fill="url(#subject)"/>
    <!-- vignette -->
    <rect x="0" y="0" width="360" height="740" rx="44" fill="none" stroke="#000000" stroke-opacity="0.30" stroke-width="70"/>

    <!-- top controls -->
    <rect x="24" y="48" width="46" height="46" rx="23" fill="#141417" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <path d="M52 62 l-9 9 l9 9" fill="none" stroke="#F6F4EF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="290" y="48" width="46" height="46" rx="23" fill="#141417" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <g stroke="#F6F4EF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M315 60 l-7 11 h6 l-2 9 l8 -12 h-6 z" fill="#F6F4EF"/>
      <line x1="305" y1="84" x2="327" y2="60"/>
    </g>

    <!-- framing brackets -->
    <g stroke="#F6F4EF" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M112 232 v-18 h18"/>
      <path d="M248 214 h18 v18"/>
      <path d="M266 432 v18 h-18"/>
      <path d="M130 450 h-18 v-18"/>
    </g>
    <!-- scan line -->
    <rect x="118" y="332" width="142" height="2.5" rx="1.5" fill="#3DDC97" opacity="0.9"/>
    <rect x="118" y="328" width="142" height="11" rx="5" fill="#3DDC97" opacity="0.18"/>

    <text x="180" y="486" fill="#F6F4EF" font-size="12" font-weight="600" letter-spacing="1" text-anchor="middle" opacity="0.85">FRAME YOUR SUBJECT</text>

    <!-- bottom controls -->
    <!-- flip -->
    <rect x="276" y="630" width="46" height="46" rx="23" fill="#141417" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <g stroke="#F6F4EF" stroke-width="2.2" fill="none" stroke-linecap="round">
      <path d="M288 648 a11 11 0 0 1 21 -3"/>
      <path d="M310 638 v8 h-8"/>
      <path d="M310 658 a11 11 0 0 1 -21 3"/>
      <path d="M288 668 v-8 h8"/>
    </g>
    <!-- shutter -->
    <circle cx="180" cy="652" r="40" fill="none" stroke="#F6F4EF" stroke-width="4"/>
    <circle cx="180" cy="652" r="31" fill="#F6F4EF"/>

    <rect x="0.5" y="0.5" width="359" height="739" rx="44" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
  </g>
</svg>
